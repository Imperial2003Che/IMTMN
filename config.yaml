data:
  root_dir: './datasets'
  datasets:
    - 'University-1652'
    - 'SUES-200'
  image_size: 256
  batch_size: 2
  num_workers: 0

# IMTMN (Improved Multi-View Transformer Matching Network) 配置
model:
  arch: 'imtmn'
  d_model: 256           # 特征维度
  num_heads: 8            # 注意力头数
  num_layers: 4           # Transformer 层数
  topk_attn: 64           # 稀疏注意力 Top-k (创新2)
  use_sparse: true        # 是否启用稀疏 Cross-Attention
  transformer_size: 32    # Transformer 内部特征图尺寸 (32→32×32=1024 tokens, 防OOM)
  topk_match: 200         # 匹配输出 Top-k 点数
  sinkhorn_iters: 50      # Sinkhorn 迭代次数
  ffn_dim: 1024           # FFN 中间维度
  dropout: 0.1
  pretrained_backbone: true  # 是否使用预训练 ResNet50
  num_views: 3

training:
  epochs: 50
  lr: 0.0001
  weight_decay: 0.0001
  warmup_epochs: 5
  scheduler: 'cosine'
  use_amp: false
  scheduler_params:
    step_size: 10
    gamma: 0.1

loss:
  match_weight: 1.0       # L_match 权重
  geo_weight: 0.5         # L_geo 权重 (λ)
  retrieval_weight: 0.5   # L_retrieval 权重
  temperature: 0.07       # InfoNCE 温度

checkpoint:
  save_dir: './checkpoints'
  save_interval: 5
  save_best: true
  resume: null

output:
  output_dir: './outputs'
  save_predictions: true
  save_visualizations: true

evaluation:
  val_interval: 1

logging:
  log_dir: './logs'
  log_interval: 10
  tensorboard: true

misc:
  device: 'cpu'
  seed: 42
  debug: false
