data:
  root_dir: './datasets'
  datasets:
    - 'University-1652'
    - 'SUES-200'
  image_size: 256
  batch_size: 8
  num_workers: 4
  dataset_settings:
    University-1652:
      train_ratio: 0.85
      val_ratio: 0.15
      ground_sources: ['street', 'google']
      train_uav_samples_per_class: 16
      val_uav_samples_per_class: 16
      val_queries_per_class: 8
      val_ground_queries_per_class: 4
    SUES-200:
      train_ratio: 0.70
      val_ratio: 0.15
      train_uav_samples_per_class: 16
      val_uav_samples_per_class: 16
      val_queries_per_class: 8

model:
  arch: 'imtmn'
  d_model: 256
  num_heads: 8
  num_layers: 4
  topk_attn: 64
  use_sparse: true
  transformer_size: 32
  topk_match: 200
  sinkhorn_iters: 50
  ffn_dim: 1024
  dropout: 0.1
  pretrained_backbone: true

training:
  epochs: 60
  lr: 0.0003
  weight_decay: 0.0001
  scheduler: 'cosine'
  eta_min: 0.000001
  warmup_epochs: 5
  grad_accum_steps: 2
  use_amp: true

loss:
  match_weight: 1.0
  geo_weight: 0.5
  retrieval_weight: 0.5
  temperature: 0.07

checkpoint:
  save_dir: './checkpoints'
  save_interval: 5
  save_best: true
  resume: null

output:
  output_dir: './outputs'
  save_predictions: false
  save_visualizations: false

evaluation:
  val_interval: 3
  batch_size: 8
  retrieval_ks: [1, 5, 10]
  run_retrieval_on_val: true
  include_reverse: true

logging:
  log_dir: './logs'
  log_interval: 50
  tensorboard: true

misc:
  device: 'auto'
  seed: 42
  debug: false
