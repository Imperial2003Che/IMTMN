data:
  root_dir: './datasets'
  datasets:
    - 'University-1652'
    - 'SUES-200'
  image_size: 96
  batch_size: 1
  num_workers: 0
  dataset_settings:
    University-1652:
      train_ratio: 0.05
      val_ratio: 0.02
      max_train_classes: 16
      max_val_classes: 8
      max_test_classes: 16
      train_uav_samples_per_class: 2
      val_uav_samples_per_class: 2
      val_queries_per_class: 2
      val_ground_queries_per_class: 1
    SUES-200:
      train_ratio: 0.10
      val_ratio: 0.05
      max_train_classes: 10
      max_val_classes: 6
      max_test_classes: 10
      train_uav_samples_per_class: 4
      val_uav_samples_per_class: 4
      val_queries_per_class: 4

model:
  arch: 'imtmn'
  d_model: 64
  num_heads: 4
  num_layers: 1
  topk_attn: 8
  use_sparse: true
  transformer_size: 8
  topk_match: 20
  sinkhorn_iters: 5
  ffn_dim: 128
  dropout: 0.1
  pretrained_backbone: true

training:
  epochs: 5
  lr: 0.0001
  weight_decay: 0.0001
  scheduler: 'cosine'
  eta_min: 0.000001
  warmup_epochs: 0
  grad_accum_steps: 4
  use_amp: false

loss:
  match_weight: 1.0
  geo_weight: 0.5
  retrieval_weight: 0.5
  temperature: 0.07

checkpoint:
  save_dir: './checkpoints'
  save_interval: 1
  save_best: true
  resume: null

output:
  output_dir: './outputs'
  save_predictions: false
  save_visualizations: false

evaluation:
  val_interval: 1
  batch_size: 1
  retrieval_ks: [1, 5, 10]
  run_retrieval_on_val: true
  include_reverse: true

logging:
  log_dir: './logs'
  log_interval: 10
  tensorboard: false

misc:
  device: 'cpu'
  seed: 42
  debug: true
